<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Welcome to Hillman's Portfolio"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com https://s.ytimg.com https://js.stripe.com https://apis.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; media-src 'self' blob: data:; connect-src 'self' https://api.system-design.hillmanchan.com https://bugspark.hillmanchan.com https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebase.googleapis.com https://api.stripe.com wss://*.firebaseio.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://buy.stripe.com https://js.stripe.com https://*.firebaseapp.com https://docs.google.com https://card-game-pied-kappa.vercel.app; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self' https://buy.stripe.com https://docs.google.com; upgrade-insecure-requests"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/port_logo.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <script>
      (function () {
        var gameSubdomains = { 'card-drawer': 1, 'connect4': 1, 'card-game': 1, 'math-memory': 1 };
        var sub = window.location.hostname.split('.')[0];
        if (gameSubdomains[sub]) {
          var link = document.querySelector('link[rel="manifest"]');
          if (link) link.setAttribute('href', '/pwa/' + sub + '.webmanifest');
          var touch = document.querySelector('link[rel="apple-touch-icon"]');
          if (touch) touch.setAttribute('href', '/games/' + sub + '/icon-192.png');
        }
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', function () {
            navigator.serviceWorker.register('/sw.js').catch(function (err) {
              console.warn('[pwa] shell service worker registration failed:', err);
            });
          });
        }
      })();
    </script>
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Hillman's Portfolio</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
