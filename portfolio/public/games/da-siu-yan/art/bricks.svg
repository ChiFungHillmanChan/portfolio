<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 380" width="460" height="380">
  <!-- Three-brick altar stack, hand-illustrated style: bold ink outlines,
       warm terracotta faces. Drawn at stage (20,850) size 460x380. -->
  <g stroke="#3a2317" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
    <!-- bottom-left brick -->
    <polygon points="10,196 228,188 248,160 30,166" fill="#b96a4a"/>
    <polygon points="228,188 248,160 252,268 232,296" fill="#7e3d2a"/>
    <polygon points="10,196 228,188 232,296 14,306" fill="#a05138"/>
    <!-- bottom-right brick (slightly different hue, mirrored perspective) -->
    <polygon points="240,192 448,200 430,168 258,164" fill="#c1714f"/>
    <polygon points="240,192 258,164 254,272 238,300" fill="#84422c"/>
    <polygon points="240,192 448,200 444,308 238,300" fill="#a9573b"/>
    <!-- top brick -->
    <polygon points="60,60 330,48 352,20 84,30" fill="#c1714f"/>
    <polygon points="330,48 352,20 358,120 336,150" fill="#84422c"/>
    <polygon points="60,60 330,48 336,150 66,166" fill="#ab5a3d"/>
  </g>
  <!-- brick holes on the top faces -->
  <g fill="#4a2a1c" stroke="#3a2317" stroke-width="4">
    <ellipse cx="150" cy="44" rx="16" ry="8"/>
    <ellipse cx="230" cy="40" rx="16" ry="8"/>
    <ellipse cx="120" cy="180" rx="14" ry="7"/>
    <ellipse cx="330" cy="182" rx="14" ry="7"/>
  </g>
  <!-- speckle + chip texture -->
  <g stroke="#7e3d2a" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <path d="M100 100 l26 -3"/>
    <path d="M240 120 l20 -2"/>
    <path d="M150 135 l14 -2"/>
    <path d="M60 250 l22 -3"/>
    <path d="M150 230 l16 -2"/>
    <path d="M300 250 l24 2"/>
    <path d="M380 230 l16 2"/>
  </g>
  <g stroke="#d9906c" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <path d="M90 80 l30 -3"/>
    <path d="M280 70 l24 -3"/>
    <path d="M40 220 l20 -2"/>
    <path d="M270 220 l22 2"/>
  </g>
</svg>
