<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" width="360" height="780">
  <!-- Seated granny, facing left, WITHOUT her right (striking) arm — that is
       art/granny-arm.svg, rotated at the shoulder. Drawn at stage (350,425)
       1:1, so the shoulder pivot (290,215) here = stage (640,640). Floor is
       at y≈680 in this viewBox. -->
  <g stroke="#3a2317" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
    <!-- stool -->
    <line x1="272" y1="505" x2="268" y2="655" stroke="#5a3a20" stroke-width="12"/>
    <path d="M185 468 Q265 452 348 460 L352 500 Q268 514 192 510 Z" fill="#8a5a33"/>
    <path d="M188 486 Q266 474 350 480" fill="none" stroke="#6e4526" stroke-width="5"/>
    <line x1="205" y1="507" x2="195" y2="675" stroke="#6e4526" stroke-width="13"/>
    <line x1="330" y1="500" x2="342" y2="672" stroke="#6e4526" stroke-width="13"/>
    <line x1="199" y1="600" x2="337" y2="596" stroke="#6e4526" stroke-width="9"/>

    <!-- lower legs + bare feet -->
    <path d="M152 570 L138 660 Q136 672 124 670 L94 668 Q80 666 84 654 Q90 648 104 650 L118 652 L130 566 Z"
          fill="#d99a63"/>
    <path d="M210 580 L200 664 Q198 676 186 674 L154 672 Q142 670 146 658 Q152 652 164 654 L180 656 L190 576 Z"
          fill="#c98c55"/>
    <path d="M94 668 q-6 -8 -2 -14" fill="none" stroke-width="4"/>
    <path d="M154 672 q-6 -8 -2 -14" fill="none" stroke-width="4"/>

    <!-- skirt: dark red, draping from waist over the stool, knees left -->
    <path d="M168 372 Q140 420 100 470 Q66 516 60 570 Q58 594 82 596 L230 614 Q286 618 308 560 L318 470 Q322 420 305 372 Q240 356 168 372 Z"
          fill="#9c2f22"/>
    <path d="M150 420 Q120 480 104 552" fill="none" stroke="#7e251b" stroke-width="6"/>
    <path d="M204 412 Q186 490 176 580" fill="none" stroke="#7e251b" stroke-width="6"/>
    <path d="M258 408 Q252 490 246 596" fill="none" stroke="#7e251b" stroke-width="6"/>

    <!-- torso: yellow top, leaning slightly forward -->
    <path d="M158 214 Q136 262 134 322 Q133 366 165 388 Q238 404 306 390 Q318 330 310 262 Q306 226 292 212 Q224 194 158 214 Z"
          fill="#d8a93a"/>
    <path d="M150 300 Q200 322 300 314" fill="none" stroke="#b8892a" stroke-width="6"/>
    <path d="M160 352 Q220 370 298 360" fill="none" stroke="#b8892a" stroke-width="6"/>

    <!-- her left arm: bent sleeve hugging the chest, hand on the belly -->
    <path d="M188 216 Q146 240 141 296 Q138 336 170 352 Q188 360 196 346 Q202 332 184 322 Q168 312 170 278 Q172 246 192 232 Z"
          fill="#c99a2f"/>
    <ellipse cx="192" cy="346" rx="21" ry="16" fill="#d99a63"/>
    <path d="M176 340 q10 -8 24 -4" fill="none" stroke-width="4"/>
    <path d="M178 352 q12 -6 26 -2" fill="none" stroke-width="4"/>

    <!-- neck -->
    <path d="M196 168 L192 208 Q216 220 244 210 L240 168 Z" fill="#c98c55"/>

    <!-- head: skin, jaw toward the left -->
    <path d="M150 58 Q124 84 128 132 Q131 172 162 190 Q196 206 232 192 Q268 178 272 132 Q276 84 250 56 Q200 36 150 58 Z"
          fill="#d99a63"/>

    <!-- hair: grey, swept back into a bun -->
    <path d="M143 92 Q136 48 176 34 Q220 20 258 42 Q284 58 280 100 Q270 82 252 74 Q246 92 232 84 Q220 76 214 62 Q196 74 178 68 Q168 84 152 82 Q146 88 143 92 Z"
          fill="#6d655e"/>
    <circle cx="284" cy="58" r="34" fill="#6d655e"/>
    <path d="M270 46 q20 -6 28 12 q4 16 -12 24" fill="none" stroke="#57504a" stroke-width="5"/>
    <path d="M160 62 q30 -18 74 -8" fill="none" stroke="#8a837c" stroke-width="5"/>

    <!-- angry face -->
    <path d="M190 88 L134 106" stroke-width="10"/>
    <path d="M252 92 L206 106" stroke-width="10"/>
    <ellipse cx="162" cy="120" rx="18" ry="9" fill="#fdf6e6" stroke-width="5"/>
    <circle cx="155" cy="121" r="6" fill="#3a2317" stroke="none"/>
    <ellipse cx="226" cy="118" rx="15" ry="8" fill="#fdf6e6" stroke-width="5"/>
    <circle cx="219" cy="119" r="5" fill="#3a2317" stroke="none"/>
    <path d="M152 108 Q133 124 130 144 Q130 152 142 152" fill="none" stroke-width="6"/>
    <!-- shouting mouth -->
    <path d="M140 160 Q170 150 202 160 Q210 178 196 190 Q166 202 146 190 Q132 174 140 160 Z"
          fill="#5a1410" stroke-width="6"/>
    <path d="M144 162 Q170 154 198 162 L196 172 Q170 165 146 172 Z" fill="#fdf6e6" stroke="none"/>
    <path d="M154 190 Q170 180 190 188 Q172 196 154 190 Z" fill="#b0402f" stroke="none"/>
    <!-- wrinkles -->
    <path d="M158 46 q40 -12 64 0" fill="none" stroke="#c07f4a" stroke-width="4"/>
    <path d="M212 146 q8 14 4 26" fill="none" stroke="#c07f4a" stroke-width="4"/>
    <path d="M248 112 l14 -4 M248 122 l14 2" fill="none" stroke="#c07f4a" stroke-width="4"/>
  </g>
</svg>
