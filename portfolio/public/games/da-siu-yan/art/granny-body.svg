<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 780" width="360" height="780">
  <!-- Seated granny, facing left, WITHOUT her right (striking) arm — that is
       art/granny-arm.svg, rotated at the shoulder. Drawn at stage (350,425)
       1:1, so the shoulder pivot (290,215) here = stage (640,640). Floor is
       at y≈680 in this viewBox. Feet stay right of x≈95; bun/back ≤ x≈318. -->
  <defs>
    <radialGradient id="gb-blush" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#cf7d52" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#cf7d52" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gb-skirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a83527"/>
      <stop offset="0.55" stop-color="#9c2f22"/>
      <stop offset="1" stop-color="#82271c"/>
    </linearGradient>
    <linearGradient id="gb-top" x1="0" y1="0" x2="1" y2="0.25">
      <stop offset="0" stop-color="#e0b246"/>
      <stop offset="0.55" stop-color="#d8a93a"/>
      <stop offset="1" stop-color="#c3922e"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="222" cy="678" rx="146" ry="9" fill="#3a2317" opacity="0.1"/>

