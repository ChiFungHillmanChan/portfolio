</head>
<body>
    <!-- Fixed Hamburger Menu -->

        <span class="back-icon">←</span>
        <span class="back-text">Back</span>
    </a>
    <nav class="dropdown-menu" id="dropdownMenu" aria-hidden="true">
        <div class="dropdown-section">
            <div class="dropdown-label">Games</div>
            <a href="../../../roulette/index.html" class="dropdown-item">
                <span class="dropdown-icon"><svg class="ui-svg-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="3" x2="12" y2="9"/><line x1="12" y1="15" x2="12" y2="21"/><line x1="3" y1="12" x2="9" y2="12"/><line x1="15" y1="12" x2="21" y2="12"/></svg></span>
                <span>Roulette</span>
            </a>
            <a href="../../index.html" class="dropdown-item active">
                <span class="dropdown-icon"><svg class="ui-svg-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><rect x="5" y="3" width="14" height="18" rx="2"/><path d="M12 8c-1.4 2-3 3-3 5a3 3 0 0 0 6 0c0-2-1.6-3-3-5z" fill="currentColor" stroke="none"/><rect x="11.3" y="15.5" width="1.4" height="1.8" rx="0.2" fill="currentColor" stroke="none"/></svg></span>
                <span>Blackjack</span>
                <span class="current-badge">Current</span>
            </a>
            <a href="../../../baccarat/index.html" class="dropdown-item">
                <span class="dropdown-icon"><svg class="ui-svg-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><rect x="3" y="6" width="11" height="15" rx="1.5"/><rect x="10" y="3" width="11" height="15" rx="1.5"/></svg></span>
                <span>Baccarat</span>
            </a>
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-section">
            <a href="../../../index.html" class="dropdown-item">
                <span class="dropdown-icon"><svg class="ui-svg-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg></span>
                <span>Back to Games</span>
            </a>
            <a href="https://buymeacoffee.com/hillmanchan709" class="dropdown-item support-item" target="_blank" rel="noopener noreferrer">
                <span class="dropdown-icon"><svg class="ui-svg-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M4 8h14v6a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4z"/><path d="M18 10h2a2 2 0 0 1 0 4h-2"/><path d="M7 2v3M11 2v3M15 2v3"/></svg></span>
                <span>Support Me</span>
            </a>
        </div>
    </nav>

    <div class="container practice-container">
        <a href="../index.html" class="back-link">← Back to Practice</a>

        <!-- Setup Screen -->
        <div id="setup-screen" class="screen active">
            <header class="practice-header">
                <h1 class="practice-title">EASY MODE</h1>
                <p class="practice-subtitle">Flash Card Training</p>
            </header>

            <div class="setup-options">
                <h3>Choose Pacing</h3>
                <div class="pacing-options">
                    <button class="pacing-btn active" data-pacing="auto">
                        <span class="pacing-icon"><svg class="ui-svg-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false"><polygon points="13 2 4 14 11 14 9 22 20 10 13 10"/></svg></span>
                        <span class="pacing-name">Auto-Deal</span>
                        <span class="pacing-desc">Adaptive speed - gets faster as you improve</span>
                    </button>
                    <button class="pacing-btn" data-pacing="manual">
                        <span class="pacing-icon"><svg class="ui-svg-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M9 11V5a2 2 0 1 1 4 0v6"/><path d="M13 11V8a2 2 0 1 1 4 0v3"/><path d="M17 11v-1a2 2 0 1 1 4 0v6a6 6 0 0 1-6 6h-3.5a4 4 0 0 1-3.45-2L4 13a2 2 0 0 1 3-2.5l2 1.5"/></svg></span>
                        <span class="pacing-name">Manual</span>
                        <span class="pacing-desc">You control the pace, 60s total time</span>
                    </button>
                </div>
            </div>

            <button id="start-btn" class="practice-btn practice-btn-primary start-btn">
                Start Practice
            </button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="stat-box timer-box">
                    <span class="stat-label">Time</span>
                    <span id="timer-display" class="stat-value">60</span>
                </div>
                <div class="stat-box score-box">
                    <span class="stat-label">Score</span>
                    <span id="score-display" class="stat-value">0/0</span>
                </div>
                <div class="stat-box streak-box">
                    <span class="stat-label">Streak</span>
                    <span id="streak-display" class="stat-value">0</span>
                </div>
            </div>

            <div class="card-display-area">
                <div id="card-display" class="card-display">
                    <span class="card-rank">?</span>
                    <span class="card-suit"></span>
                </div>
                <div id="feedback-display" class="feedback-display"></div>
            </div>

            <div class="answer-buttons">
                <button class="answer-btn plus" data-value="1">+1</button>
                <button class="answer-btn zero" data-value="0">0</button>
                <button class="answer-btn minus" data-value="-1">-1</button>
            </div>

            <div id="speed-indicator" class="speed-indicator">
                Speed: <span id="speed-value">3.0s</span>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <header class="practice-header">
                <h1 class="practice-title">SESSION COMPLETE</h1>
            </header>

            <div class="results-grid">
                <div class="result-card">
                    <span class="result-label">Cards Seen</span>
                    <span id="result-cards" class="result-value">0</span>
                </div>
                <div class="result-card">
                    <span class="result-label">Correct</span>
                    <span id="result-correct" class="result-value">0</span>
                </div>
                <div class="result-card">
                    <span class="result-label">Accuracy</span>
                    <span id="result-accuracy" class="result-value">0%</span>
                </div>
                <div class="result-card">
                    <span class="result-label">Best Streak</span>
                    <span id="result-streak" class="result-value">0</span>
                </div>
            </div>

            <div class="results-actions">
                <button id="retry-btn" class="practice-btn practice-btn-primary">Try Again</button>
                <a href="../index.html" class="practice-btn practice-btn-secondary">Back to Menu</a>
            </div>
        </div>
    </div>

    <script src="../../js/shared/constants.js"></script>
    <script src="../js/practice-constants.js"></script>
    <script src="../js/practice-stats.js"></script>
    <script src="../js/countdown-timer.js"></script>
    <script src="js/easy-mode.js"></script>
    <script src="../../../js/hamburger-menu.js"></script>
</body>
</html>
