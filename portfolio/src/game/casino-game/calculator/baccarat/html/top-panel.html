<!-- Top Panel - Most Important: Recommendation + Card Dealing -->
<div class="panel panel-primary">
    <!-- Recommendation Section - THE MOST IMPORTANT -->
    <div class="recommendation-section">
        <h2 class="panel-title"><svg class="ui-svg-icon" width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.6" fill="currentColor"/></svg> Recommendation</h2>
        <div id="alertContainer"></div>
        <div id="positiveEvList"></div>
    </div>

    <!-- Divider -->
    <div class="section-divider"></div>

    <!-- Card Dealing Section -->
    <div class="dealing-section">
        <h2 class="panel-title">Deal Cards</h2>
        <div class="card-grid" id="cardGrid"></div>
        
        <div class="hand-display">
            <div class="hand-row">
                <span class="hand-label player">Player</span>
                <div class="hand-cards" id="playerCards"></div>
                <span class="hand-total player" id="playerTotal">-</span>
            </div>
            <div class="hand-row">
                <span class="hand-label banker">Banker</span>
                <div class="hand-cards" id="bankerCards"></div>
                <span class="hand-total banker" id="bankerTotal">-</span>
            </div>
        </div>

        <div class="dealing-indicator" id="dealingIndicator">
            Deal: Player Card 1
        </div>

        <div class="action-buttons">
            <button class="btn btn-undo" onclick="undoLastCard()">↩ Undo</button>
            <button class="btn btn-reset" onclick="newShoe()">New Shoe</button>
        </div>
    </div>
</div>
